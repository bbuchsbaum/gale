name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Scala 3.3.8, ${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [JVM, JS]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run ${{ matrix.platform }} tests
        run: sbt -v "core${{ matrix.platform }}/test" "laws${{ matrix.platform }}/test"

  scala-next:
    name: Scala Next (${{ matrix.scala }})
    runs-on: ubuntu-latest
    # Non-failing-fast: a Scala Next regression must not fail the workflow.
    continue-on-error: true
    strategy:
      matrix:
        # Bump to the latest published 3.8.x as it advances.
        scala: ["3.8.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile and test on Scala Next
        run: sbt "++${{ matrix.scala }}" testAll

  bench:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Compile JVM (JMH) and JS benchmarks
        run: sbt benchCompile

  wasm:
    name: WebAssembly link (experimental)
    runs-on: ubuntu-latest
    # Optional/allow-failure: the experimental Wasm backend must not gate CI.
    continue-on-error: true
    env:
      GALE_WASM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Link the JS test bundle to WebAssembly
        # A link check exercises the Wasm backend without needing the Node
        # --experimental-wasm-exnref runtime flag that executing tests requires.
        run: sbt coreJS/Test/fastLinkJS
