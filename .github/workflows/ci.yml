name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Scala 3.3.8, ${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [JVM, JS]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run ${{ matrix.platform }} tests
        run: sbt -v "core${{ matrix.platform }}/test" "laws${{ matrix.platform }}/test"

  scala-next:
    name: Scala Next (${{ matrix.scala }})
    runs-on: ubuntu-latest
    # Non-failing-fast: a Scala Next regression must not fail the workflow.
    continue-on-error: true
    strategy:
      matrix:
        # Bump to the latest published 3.8.x as it advances.
        scala: ["3.8.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile and test on Scala Next
        run: sbt "++${{ matrix.scala }}" testAll

  bench:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Compile JVM (JMH) and JS benchmarks
        run: sbt benchCompile

  vector-backend:
    name: Vector backend (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Test Vector API backend
        run: sbt vectorBackendTest
      # The bench job already compiles the JMH benchmarks on JDK 21; only the JDK 22
      # leg adds coverage here.
      - name: Compile the JMH crossover benchmark (JDK 22)
        if: matrix.java == '22'
        run: sbt benchCompile

  ffm-blas-backend:
    name: FFM BLAS/LAPACK backend (JDK 22 / OpenBLAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Install OpenBLAS CBLAS runtime
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Test native storage and FFM BLAS/LAPACK conformance
        run: sbt nativeBackendTest blasFfmBackendTest benchFfmCompile

  wasm:
    name: WebAssembly link (experimental)
    runs-on: ubuntu-latest
    # Optional/allow-failure: the experimental Wasm backend must not gate CI.
    continue-on-error: true
    env:
      GALE_WASM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Link the JS test bundle to WebAssembly
        # A link check exercises the Wasm backend without needing the Node
        # --experimental-wasm-exnref runtime flag that executing tests requires.
        run: sbt coreJS/Test/fastLinkJS
